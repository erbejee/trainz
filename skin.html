<!DOCTYPE html>
<html lang="en">

<style>
     body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            padding-bottom: 2rem;
        }

        .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.5);
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        backdrop-filter: blur(10px);
        z-index: 100;
        color: white;
        }
        
        .navbar .brand {
        font-weight: 600;
        font-size: 1.2rem;
        }
        
        .menu-toggle {
        display: none;
        font-size: 1.5rem;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        }
        
        .menu {
        display: flex;
        gap: 2rem;
        }
        
        .menu a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
        }
        
        .menu a:hover {
        color: #ffcc70;
        }
        
        @media (max-width: 768px) {
        .menu-toggle {
        display: block;
        }
        
        .menu {
        display: none;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        padding: 1rem 0;
        background-color: rgba(0, 0, 0, 0.7);
        }
        
        .menu.active {
        display: flex;
        }
        }

        h2 {
            text-align: center;
            margin-top: 2rem;
            color: #ffe;
        }

        .skin-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            padding: 1rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .skin-item {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .skin-item:hover {
            transform: translateY(-5px);
        }

        .skin-item img {
            width: 100%;
            border-radius: 0.5rem;
        }

        .skin-item a {
            color: #ffcc70;
            text-decoration: none;
            display: block;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        hr {
            width: 80%;
            border: none;
            border-top: 2px solid rgba(255,255,255,0.2);
            margin: 2rem auto;
        }
</style>
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

    </nav>

</html>
